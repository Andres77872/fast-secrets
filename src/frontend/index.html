<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fast-secrets · local secrets &amp; API workbench</title>
  <meta name="description" content="Generate secrets and debug API data privately in your browser.">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <script src="/static/theme.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">🔑</span> fast-secrets</div>
    <span class="local-badge" title="Inputs and results stay in this browser"><span aria-hidden="true">●</span> Runs locally</span>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Views">
      <button class="tab is-active" role="tab" aria-selected="true" tabindex="0" aria-controls="view-single" data-view="single">Toolbox</button>
      <button class="tab" role="tab" aria-selected="false" tabindex="-1" aria-controls="view-dashboard" data-view="dashboard">Generate all</button>
      <button class="tab" role="tab" aria-selected="false" tabindex="-1" aria-controls="view-diff" data-view="diff">Text diff</button>
    </nav>
    <div class="actions">
      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">◑</button>
      <a class="icon-btn" href="/docs" target="_blank" rel="noopener" title="API docs">API</a>
    </div>
  </header>

  <main>
    <!-- ── Single ───────────────────────────────────────────── -->
    <section id="view-single" class="view is-active" role="tabpanel" aria-label="Single generator" tabindex="0">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="filter-wrap">
            <input id="gen-filter" class="filter" type="search" placeholder="Filter generators…" autocomplete="off" aria-label="Filter generators">
            <kbd class="kbd">/</kbd>
          </div>
          <div id="gen-count" class="gen-count" aria-live="polite"></div>
        </div>
        <div id="gen-list" class="gen-list" role="listbox" aria-label="Generators"></div>
      </aside>

      <div class="workspace">
        <div class="ws-head">
          <div class="ws-title-row">
            <h1 id="gen-title">—</h1>
            <button id="favorite" class="favorite" type="button" aria-label="Add tool to favorites" aria-pressed="false" title="Favorite this tool">☆</button>
          </div>
          <p id="gen-desc" class="desc"></p>
          <div id="tool-notices" class="tool-notices" aria-live="polite"></div>
        </div>

        <div class="opt-card">
          <form id="options-form" class="options" autocomplete="off"></form>

          <div id="smart-suggestions" class="smart-suggestions" aria-live="polite" hidden></div>

          <div id="preset-bar" class="preset-bar" hidden>
            <label class="field preset-field">
              <span>Rules preset</span>
              <select id="preset-select"><option value="">Current settings</option></select>
            </label>
            <button id="preset-save" class="ghost" type="button">Save rules</button>
            <button id="preset-delete" class="ghost" type="button" disabled>Delete</button>
          </div>

          <div class="controls">
            <div id="strength" class="strength" role="status" hidden>
              <div class="strength-track"><div class="strength-fill"></div></div>
              <span class="strength-label"></span>
            </div>
            <label class="field count-field" id="count-wrap">
              <span>Count</span>
              <input type="number" id="count" min="1" max="1000" value="1">
            </label>
            <label class="switch" title="Regenerate automatically when options change">
              <input type="checkbox" id="live"><span>Live</span>
            </label>
            <button id="generate" class="primary" type="button" title="Generate (Ctrl+Enter)">Generate</button>
          </div>
        </div>

        <div class="out-card">
          <div class="out-card-head">
            <span id="output-count" class="muted">Output</span>
            <div class="output-actions">
              <button id="copy-all" class="ghost" type="button">Copy all</button>
              <select id="export-format" class="ghost export-format" aria-label="Export format" title="Export format">
                <option value="txt">.txt</option>
                <option value="json">.json</option>
                <option value="csv">.csv</option>
              </select>
              <button id="download" class="ghost" type="button">Download</button>
              <button id="clear" class="ghost" type="button">Clear</button>
            </div>
          </div>
          <div id="visual-output" class="visual-output" hidden></div>
          <div id="output-cols" class="out-cols" hidden aria-hidden="true">
            <span class="col-idx">#</span>
            <span class="col-val">Value</span>
            <span class="col-num">Chars</span>
            <span class="col-num">Bytes</span>
            <span class="col-bits">Entropy</span>
            <span></span>
          </div>
          <ul id="output" class="output" aria-live="off"></ul>
        </div>
      </div>
    </section>

    <!-- ── Dashboard ────────────────────────────────────────── -->
    <section id="view-dashboard" class="view" role="tabpanel" aria-label="Generate all" tabindex="0">
      <div class="dash-toolbar">
        <button id="dash-all" class="ghost" type="button">Select all</button>
        <button id="dash-none" class="ghost" type="button">Clear</button>
        <span id="dash-selected" class="badge badge-muted" aria-live="polite"></span>
        <label class="field count-field">
          <span>Count</span>
          <input type="number" id="dash-count" min="1" max="100" value="1">
        </label>
        <span class="spacer"></span>
        <button id="dash-generate" class="primary" type="button" title="Generate selected (Ctrl+Enter)">Generate selected</button>
      </div>
      <div id="dash-grid" class="dash-grid"></div>
    </section>

    <!-- ── Text diff ────────────────────────────────────────── -->
    <section id="view-diff" class="view" role="tabpanel" aria-label="Text diff" tabindex="0">
      <div class="diff-inputs">
        <label class="diff-pane">
          <span class="diff-pane-label">Original</span>
          <textarea id="diff-a" class="diff-text" spellcheck="false" placeholder="Paste original text…"></textarea>
        </label>
        <label class="diff-pane">
          <span class="diff-pane-label">Changed</span>
          <textarea id="diff-b" class="diff-text" spellcheck="false" placeholder="Paste changed text…"></textarea>
        </label>
      </div>

      <div class="diff-toolbar">
        <div class="tb-group">
          <div class="seg-group" id="diff-mode" role="group" aria-label="Diff view mode">
            <button class="seg is-active" type="button" data-mode="inline">Inline</button>
            <button class="seg" type="button" data-mode="split">Side-by-side</button>
          </div>
        </div>
        <span class="tb-div" aria-hidden="true"></span>
        <div class="tb-group">
          <label class="toggle"><input type="checkbox" id="diff-ws"><span>Ignore whitespace</span></label>
          <label class="toggle"><input type="checkbox" id="diff-case"><span>Ignore case</span></label>
          <label class="field count-field">
            <span>Granularity</span>
            <select id="diff-gran">
              <option value="word">Word</option>
              <option value="char">Char</option>
            </select>
          </label>
        </div>
        <span class="spacer"></span>
        <div class="tb-group">
          <label class="switch" title="Re-compare automatically as you type">
            <input type="checkbox" id="diff-live"><span>Live</span>
          </label>
          <span class="tb-div" aria-hidden="true"></span>
          <button id="diff-swap" class="ghost" type="button" disabled>Swap</button>
          <button id="diff-clear" class="ghost" type="button" disabled>Clear</button>
          <button id="diff-copy" class="ghost" type="button" disabled>Copy unified</button>
          <button id="diff-run" class="primary" type="button" title="Compare (Ctrl+Enter)">Compare</button>
        </div>
      </div>

      <div class="diff-summary" id="diff-summary"></div>
      <div id="diff-result" class="diff-result" aria-live="polite"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
